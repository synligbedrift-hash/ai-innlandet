name: Generer hero-bilde

on:
  schedule:
    - cron: '0 * * * *'  # Hver hele time
  workflow_dispatch:       # Manuell kjøring

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generer SVG
        run: python scripts/generate-hero.py

      - name: Commit og push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hero-generated.svg
          git diff --cached --quiet || (git commit -m "Auto: nytt hero-bilde $(date -u +'%Y-%m-%d %H:00 UTC')" && git push)
